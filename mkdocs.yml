site_name: LLM Promptkit
site_description: A toolkit for building effective LLM prompts from proven patterns
site_url: https://petsku01.github.io/promptkit
repo_url: https://github.com/Petsku01/promptkit
repo_name: Petsku01/promptkit

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Patterns:
    - Overview: patterns/index.md
    - Reasoning: patterns/reasoning.md
    - Agentic: patterns/agentic.md
    - Context: patterns/context.md
    - Output Control: patterns/output.md
    - Code: patterns/code.md
    - Review: patterns/review.md
    - Defensive: patterns/defensive.md
  - Prompts:
    - Overview: prompts/index.md
    - Code: prompts/code/index.md
    - Reasoning: prompts/reasoning/index.md
    - Debug: prompts/debug/index.md
    - Defensive: prompts/defensive/index.md
    - Education: prompts/education/index.md
    - Professional: prompts/professional/index.md
    - Creative: prompts/creative/index.md
    - Output: prompts/output/index.md
    - System: prompts/system/index.md
    - Context: prompts/context/index.md
    - Model-Optimized:
      - Overview: prompts/model-optimized/index.md
      - Anthropic: prompts/model-optimized/anthropic/index.md
      - OpenAI: prompts/model-optimized/openai/index.md
      - Google: prompts/model-optimized/google/index.md
      - DeepSeek: prompts/model-optimized/deepseek/index.md
      - Meta: prompts/model-optimized/meta/index.md
      - Mistral: prompts/model-optimized/mistral/index.md
      - Qwen: prompts/model-optimized/qwen/index.md
      - Cohere: prompts/model-optimized/cohere/index.md
      - xAI: prompts/model-optimized/xai/index.md
      - Small Models: prompts/model-optimized/small-models/index.md
      - Advanced Techniques: prompts/model-optimized/advanced-techniques/index.md
      - Agentic: prompts/model-optimized/agentic/index.md
      - Few-Shot: prompts/model-optimized/few-shot/index.md
      - Roles: prompts/model-optimized/roles/index.md
      - System Prompts: prompts/model-optimized/system-prompts/index.md
      - Safety: prompts/model-optimized/safety/index.md
      - Benchmarks: prompts/model-optimized/benchmarks/index.md
      - Evaluation: prompts/model-optimized/evaluation/index.md
      - Use Cases: prompts/model-optimized/use-cases/index.md
  - API Reference:
