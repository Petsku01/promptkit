site_name: LLM Promptkit
site_description: A toolkit for building effective LLM prompts from proven patterns
site_url: https://petsku01.github.io/promptkit
repo_url: https://github.com/Petsku01/promptkit
repo_name: Petsku01/promptkit

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Patterns:
    - Overview: patterns/index.md
    - Reasoning: patterns/reasoning.md
    - Agentic: patterns/agentic.md
    - Output Control: patterns/output.md
    - Code: patterns/code.md
    - Review: patterns/review.md
  - Prompts:
    - Overview: prompts/index.md
    - Code: prompts/code.md
    - Reasoning: prompts/reasoning.md
    - Debug: prompts/debug.md
    - Defensive: prompts/defensive.md
    - Education: prompts/education.md
    - Professional: prompts/professional.md
    - Creative: prompts/creative.md
    - Output: prompts/output.md
    - System: prompts/system.md
    - Context: prompts/context.md
    - Model-Optimized: prompts/model-optimized.md
  - API Reference:
    - PromptBuilder: api/builder.md
    - CLI: api/cli.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Petsku01/promptkit
